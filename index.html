<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lenzy</title>
<style>
@font-face {
    font-family: 'BBH Sans Hegarty';
    src: url('fonts/BBHSansHegarty-Regular.woff2') format('woff2'),
         url('fonts/BBHSansHegarty-Regular.woff') format('woff'),
         url('fonts/BBHSansHegarty-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}

:root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --muted: #666;
    --accent: #4a9eff;
    --accent-glow: rgba(74,158,255,0.15);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    cursor: url('cursor.png'), auto;
}

html, body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'BBH Sans Hegarty', 'Helvetica Neue', sans-serif;
    color: var(--text);
    overflow-x: hidden;
}

/* ── Noise grain overlay ── */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
}

/* ── CAPTCHA ── */
#captcha-screen {
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(18px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999999;
}

#captcha-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px 36px;
    border-radius: 14px;
    text-align: center;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
}

#captcha-box label {
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
}

#captcha-checkbox {
    width: 22px;
    height: 22px;
    accent-color: var(--accent);
    cursor: pointer;
}

#captcha-label {
    font-size: 18px;
    color: var(--text);
    letter-spacing: 0.02em;
}

/* ── MAIN ── */
#main-content {
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
    position: relative;
    z-index: 1;
}

/* ── VOLUME ── */
#volume-container {
    position: fixed;
    top: 22px;
    right: 22px;
    z-index: 100;
}

#volume-box {
    background: var(--surface);
    border: 1px solid var(--border);
    height: 44px;
    border-radius: 22px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 0;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
    width: 44px;
}

#volume-box:hover {
    width: 160px;
    gap: 10px;
    padding: 0 14px;
}

#volume-box img {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    opacity: 0.7;
    transition: opacity 0.2s;
}

#volume-box:hover img { opacity: 1; }

#volume-control {
    width: 0;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
    display: flex;
    align-items: center;
}

#volume-box:hover #volume-control {
    width: 90px;
    opacity: 1;
}

#volume-slider {
    width: 90px;
    height: 3px;
    border-radius: 3px;
    background: var(--surface2);
    outline: none;
    -webkit-appearance: none;
}

#volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
}

#volume-slider::-moz-range-thumb {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
    border: none;
}

/* ── COPY POPUP ── */
#copy-popup {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #1a3a24;
    border: 1px solid rgba(74,200,100,0.3);
    padding: 10px 20px;
    border-radius: 10px;
    color: #6dde8a;
    font-size: 14px;
    letter-spacing: 0.04em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s ease;
    z-index: 200;
}

#copy-popup.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* ── LAYOUT ── */
.page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 24px 60px;
}

/* ── AVATAR ── */
.avatar-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    margin-bottom: 28px;
}

.avatar-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    opacity: 0.5;
    animation: spin 12s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}

.avatar-ring::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
}

.avatar-wrap img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    border: 2px solid var(--surface2);
}

/* ── NAME & TYPEWRITER ── */
.name-block {
    text-align: center;
    margin-bottom: 10px;
}

.typewriter-line {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 48px;
}

.typewriter-line .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--accent);
    margin-left: 2px;
    animation: blink 1s step-end infinite;
    vertical-align: middle;
}

@keyframes blink {
    50% { opacity: 0; }
}

.highlight-word {
    color: var(--accent);
    position: relative;
}

/* ── BIO ── */
.bio {
    margin-top: 14px;
    font-size: 15px;
    color: var(--muted);
    text-align: center;
    max-width: 380px;
    line-height: 1.7;
    letter-spacing: 0.01em;
}

/* ── TAGS ── */
.tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
}

.tag {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    color: #aaa;
    letter-spacing: 0.03em;
    transition: all 0.2s;
}

.tag:hover {
    border-color: rgba(74,158,255,0.35);
    color: var(--accent);
    background: var(--accent-glow);
}

/* ── DIVIDER ── */
.divider {
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 32px 0;
}

/* ── SOCIAL ── */
.socials {
    display: flex;
    gap: 12px;
}

.social-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    text-decoration: none;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.02em;
    transition: all 0.22s ease;
}

.social-btn img {
    width: 18px;
    height: 18px;
    opacity: 0.7;
    transition: opacity 0.2s;
}

.social-btn:hover {
    background: var(--surface2);
    border-color: rgba(255,255,255,0.14);
    color: var(--text);
    transform: translateY(-1px);
}

.social-btn:hover img { opacity: 1; }

/* ── STATS ROW ── */
.stats-row {
    display: flex;
    gap: 1px;
    margin-top: 48px;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    background: var(--border);
}

.stat {
    background: var(--surface);
    padding: 20px 36px;
    text-align: center;
    flex: 1;
    transition: background 0.2s;
}

.stat:hover { background: var(--surface2); }

.stat-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
}

.stat-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
}
</style>
</head>

<body>

<!-- CAPTCHA -->
<div id="captcha-screen">
    <div id="captcha-box">
        <label>
            <input id="captcha-checkbox" type="checkbox">
            <span id="captcha-label">I'm not a robot</span>
        </label>
    </div>
</div>

<!-- MAIN -->
<div id="main-content">

    <!-- Volume -->
    <div id="volume-container">
        <div id="volume-box">
            <img id="volume-icon" src="volume.png" alt="volume">
            <div id="volume-control">
                <input type="range" id="volume-slider" min="0" max="100" value="50">
            </div>
        </div>
    </div>

    <!-- Copy popup -->
    <div id="copy-popup">✓ Address copied</div>

    <div class="page">

        <!-- Avatar -->
        <div class="avatar-wrap">
            <div class="avatar-ring"></div>
            <img src="lenzy.jpg" alt="Lenzy">
        </div>

        <!-- Name + typewriter -->
        <div class="name-block">
            <div class="typewriter-line">
                <span id="typewriter-text"></span><span class="cursor"></span>
            </div>
        </div>

        <!-- Bio -->
        <p class="bio">16 year old backend developer. Building affordable services that actually work.</p>

        <!-- Tags -->
        <div class="tags">
            <span class="tag">Python</span>
            <span class="tag">Java</span>
            <span class="tag">PHP</span>
            <span class="tag">Backend</span>
            <span class="tag">Open for work</span>
        </div>

        <div class="divider"></div>

        <!-- Socials -->
        <div class="socials">
            <a href="https://discord.gg/ethone" class="social-btn" target="_blank">
                <img src="discord.png" alt="Discord">
                Discord
            </a>
            <a href="https://t.me/lenziii" class="social-btn" target="_blank">
                <img src="telegram.png" alt="Telegram">
                Telegram
            </a>
            <a href="https://ethone.net" class="social-btn" target="_blank">
                <img src="website.png" alt="Website">
                ethone.net
            </a>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat">
                <div class="stat-num">16</div>
                <div class="stat-label">Age</div>
            </div>
            <div class="stat">
                <div class="stat-num">3+</div>
                <div class="stat-label">Languages</div>
            </div>
            <div class="stat">
                <div class="stat-num">$</div>
                <div class="stat-label">Affordable</div>
            </div>
        </div>

    </div>
</div>

<audio id="bgm" src="maxa.mp3" loop></audio>

<script>
// Captcha
document.getElementById("captcha-checkbox").addEventListener("change", function () {
    if (this.checked) {
        document.getElementById("captcha-screen").style.display = "none";
        const main = document.getElementById("main-content");
        main.style.opacity = "1";
        main.style.pointerEvents = "auto";
        document.getElementById("bgm").play().catch(() => {});
    }
});

// Typewriter
const messages = [
    { plain: "Hi, I'm ", bold: "Lenzy" },
    { plain: "I love ", bold: "Money" },
    { plain: "I build ", bold: "backends" }
];

const el = document.getElementById("typewriter-text");
let mi = 0, ci = 0, typing = true;

function render(msg, count) {
    const full = msg.plain + msg.bold;
    const shown = full.slice(0, count);
    if (shown.length <= msg.plain.length) {
        el.innerHTML = shown;
    } else {
        const boldPart = shown.slice(msg.plain.length);
        el.innerHTML = msg.plain + `<span class="highlight-word">${boldPart}</span>`;
    }
}

function tick() {
    const cur = messages[mi];
    const total = cur.plain.length + cur.bold.length;
    if (typing) {
        ci++;
        render(cur, ci);
        if (ci >= total) { typing = false; setTimeout(tick, 2200); return; }
        setTimeout(tick, 110);
    } else {
        ci--;
        render(cur, ci);
        if (ci <= 0) { typing = true; mi = (mi + 1) % messages.length; setTimeout(tick, 200); return; }
        setTimeout(tick, 70);
    }
}
tick();

// Volume
const audio = document.getElementById("bgm");
const slider = document.getElementById("volume-slider");
let muted = false;

audio.volume = slider.value / 100;

slider.addEventListener("input", function () {
    audio.volume = this.value / 100;
    const icon = document.getElementById("volume-icon");
    icon.src = this.value == 0 ? "muted.png" : "volume.png";
    muted = this.value == 0;
});

document.getElementById("volume-box").addEventListener("click", e => {
    if (e.target.id === "volume-slider") return;
    muted = !muted;
    audio.muted = muted;
    document.getElementById("volume-icon").src = muted ? "muted.png" : "volume.png";
    if (!muted) slider.value = audio.volume * 100;
});

// Copy
function copyAddress(addr) {
    navigator.clipboard.writeText(addr);
    const p = document.getElementById("copy-popup");
    p.classList.add("show");
    setTimeout(() => p.classList.remove("show"), 1600);
}
</script>

<script>
document.addEventListener("contextmenu", e => { e.preventDefault(); location.href = "https://ethone.net"; });
document.addEventListener("keydown", e => {
    if (e.key === "F12" || (e.ctrlKey && e.shiftKey && ["I","C","J"].includes(e.key)) || (e.ctrlKey && ["U","S"].includes(e.key))) {
        e.preventDefault(); location.href = "https://ethone.net";
    }
});
setInterval(() => {
    if (window.outerWidth - window.innerWidth > 200 || window.outerHeight - window.innerHeight > 200)
        location.href = "https://ethone.net";
}, 500);
(function() {
    let el = new Image();
    Object.defineProperty(el, "id", { get: () => location.href = "https://ethone.net" });
    console.log(el);
})();
</script>

</body>
</html>
