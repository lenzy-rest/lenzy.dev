<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lenzy</title>

<style>
@font-face {
    font-family: 'BBH Sans Hegarty';
    src: url('fonts/BBHSansHegarty-Regular.woff2') format('woff2'),
         url('fonts/BBHSansHegarty-Regular.woff') format('woff'),
         url('fonts/BBHSansHegarty-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}

* {
    cursor: url('cursor.png'), auto;
}

/* ── CAPTCHA ── */
#captcha-screen {
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(18px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999999;
    flex-direction: column;
}

#captcha-box {
    background: #141414;
    border: 1px solid rgba(255,255,255,0.07);
    padding: 32px 44px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

#captcha-title {
    font-family: 'BBH Sans Hegarty', sans-serif;
    font-size: 15px;
    color: #666;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

#captcha-btn {
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 32px;
    color: #f0f0f0;
    font-family: 'BBH Sans Hegarty', sans-serif;
    font-size: 17px;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
}

#captcha-btn:hover {
    background: #222;
    border-color: rgba(255,255,255,0.18);
    transform: translateY(-1px);
}

#captcha-btn.verified {
    border-color: rgba(74,200,100,0.4);
    color: #6dde8a;
    background: #0f1f14;
    pointer-events: none;
}

#captcha-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #444;
    transition: background 0.3s ease;
    flex-shrink: 0;
}

#captcha-btn.verified #captcha-dot {
    background: #6dde8a;
    box-shadow: 0 0 8px rgba(109,222,138,0.6);
}

/* ── MAIN ── */
#main-content {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.9s ease;
}

body {
    background: #121212;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: 'BBH Sans Hegarty', sans-serif;
    color: white;
}

/* ── VOLUME ── */
#volume-container {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}

#volume-box {
    background: #1e1e1e;
    width: 55px;
    height: 55px;
    border-radius: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0,0,0,0.4);
    transition: all 0.3s ease;
    overflow: hidden;
}

#volume-box:hover {
    width: 180px;
}

#volume-box img {
    width: 32px;
    height: 32px;
    transition: transform 0.3s ease;
}

#volume-box:hover img {
    transform: scale(0.9);
}

#volume-control {
    width: 0;
    opacity: 0;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
}

#volume-box:hover #volume-control {
    width: 100px;
    opacity: 1;
    margin-left: 10px;
}

#volume-slider {
    width: 100%;
    height: 5px;
    border-radius: 5px;
    background: #444;
    outline: none;
    -webkit-appearance: none;
}

#volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
}

#volume-slider::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    border: none;
}

/* ── COPY POPUP ── */
#copy-popup {
    position: fixed;
    left: 83%;
    top: 680px;
    transform: translateX(-50%);
    background: #0D8C2B;
    padding: 14px 26px;
    border-radius: 12px;
    color: white;
    font-size: 18px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    box-shadow: 0 0 10px rgba(0,0,0,0.6);
}

#copy-popup.show {
    opacity: 1;
}

/* ── LAYOUT ── */
.wrapper {
    position: relative;
    top: 70px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.frame {
    width: 210px;
    height: 200px;
    background-color: #121212;
    border-radius: 22px;
    border: 5px dashed rgba(90,170,255,1);
    padding: 3px;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: visible;
}

.frame img {
    width: 100%;
    height: 100%;
    border-radius: 18px;
    object-fit: cover;
    box-shadow:
        0 0 35px rgba(90,170,255,0.9),
        0 0 400px rgba(90,170,255,0.5),
        0 0 300px rgba(90,170,255,0.25);
}

.text {
    color: white;
    font-size: 44px;
    font-weight: bold;
    text-align: center;
    margin-top: 30px;
    white-space: nowrap;
    overflow: hidden;
    min-height: 60px;
    border-right: 3px solid white;
    padding-right: 5px;
}

.highlight {
    position: relative;
    display: inline-block;
}

.highlight::after {
    content: "";
    position: absolute;
    left: 0;
    top: 50%;
    width: 100%;
    height: 4px;
    background-color: red;
    transform: translateY(-50%);
}

.subtext {
    margin-top: 12px;
    font-size: 16px;
    color: #888;
    text-align: center;
    max-width: 600px;
    line-height: 1.5;
}

/* ── SOCIAL BUTTONS ── */
.social-icons {
    margin-top: 30px;
    display: flex;
    gap: 12px;
    justify-content: center;
}

.social-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 18px;
    text-decoration: none;
    color: #aaa;
    font-family: 'BBH Sans Hegarty', sans-serif;
    font-size: 15px;
    letter-spacing: 0.02em;
    transition: all 0.22s ease;
}

.social-btn img {
    width: 20px;
    height: 20px;
    opacity: 0.75;
    transition: opacity 0.2s;
}

.social-btn:hover {
    background: #222;
    border-color: rgba(255,255,255,0.16);
    color: #fff;
    transform: translateY(-2px);
}

.social-btn:hover img {
    opacity: 1;
}

/* ── INFO BOXES ── */
.box-container {
    margin-top: 140px;
    display: flex;
    justify-content: center;
    gap: 30px;
}

.info-box {
    width: 570px;
    height: 110px;
    background: #1e1e1e;
    border-radius: 18px;
    padding: 20px;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 0 8px rgba(0,0,0,0.4);
}

.info-box .box-title {
    font-family: 'BBH Sans Hegarty', sans-serif;
    font-size: 14px;
    color: #aaa;
    margin-bottom: 6px;
    display: block;
}

.project-link {
    width: 100%;
    height: 100%;
}

.project-gif {
    width: 100%;
    height: 100%;
    border-radius: 14px;
    object-fit: cover;
    cursor: pointer;
}

.tg-button {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #222;
    border-radius: 10px;
    padding: 8px 14px;
    cursor: pointer;
    text-decoration: none;
    color: white;
    transition: 0.2s;
}

.tg-button:hover {
    background: #333;
    filter: brightness(1.3);
}

.tg-button img {
    width: 22px;
    height: 22px;
}

/* ── LANGUAGE SWITCHER ── */
#lang-container {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
}

#lang-box {
    background: #1e1e1e;
    width: 55px;
    height: 55px;
    border-radius: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0,0,0,0.4);
    transition: all 0.3s ease;
    overflow: hidden;
    gap: 0;
}

#lang-flag {
    font-size: 24px;
    line-height: 1;
    flex-shrink: 0;
}

#lang-code {
    display: none;
}

#lang-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 12px;
    overflow: hidden;
    min-width: 165px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    z-index: 200;
}

#lang-container.open #lang-dropdown {
    display: block;
}

.lang-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    color: #bbb;
    font-family: 'BBH Sans Hegarty', sans-serif;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
}

.lang-option:hover {
    background: #252525;
    color: #fff;
}

.lang-option.active {
    color: #fff;
}

.lang-option .flag {
    font-size: 20px;
    line-height: 1;
}

/* ── GIF BANNER ── */
#gif-link {
    display: block;
    margin-top: 30px;
    border-radius: 14px;
    overflow: hidden;
    line-height: 0;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

#gif-link:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}

#gif-preview {
    display: block;
    max-width: 100%;
    border-radius: 14px;
}
</style>
</head>

<body>

<!-- CAPTCHA -->
<div id="captcha-screen">
    <div id="captcha-box">
        <span id="captcha-title">Verify to continue</span>
        <button id="captcha-btn" onclick="verifyCaptcha()">
            <span id="captcha-dot"></span>
            <span id="captcha-text">Click to verify</span>
        </button>
    </div>
</div>

<div id="main-content">

<div id="volume-container">
    <div id="volume-box">
        <img id="volume-icon" src="volume.png">
        <div id="volume-control">
            <input type="range" id="volume-slider" min="0" max="100" value="50">
        </div>
    </div>
</div>

<!-- LANGUAGE SWITCHER -->
<div id="lang-container">
    <div id="lang-box" onclick="toggleLang()">
        <span id="lang-flag">🇬🇧</span>
        <span id="lang-code">EN</span>
    </div>
    <div id="lang-dropdown">
        <div class="lang-option active" onclick="setLang('en')">
            <span class="flag">🇬🇧</span> English
        </div>
        <div class="lang-option" onclick="setLang('de')">
            <span class="flag">🇩🇪</span> Deutsch
        </div>
        <div class="lang-option" onclick="setLang('ru')">
            <span class="flag">🇷🇺</span> Русский
        </div>
    </div>
</div>

<div id="copy-popup">✔ Address Copied</div>

<div class="wrapper">
    <div class="frame">
        <img src="lenzy.jpg" alt="Image">
    </div>
    <div class="text" id="typewriter"></div>
    <div class="subtext" id="subtext-about">About Me</div>
    <div class="subtext" id="subtext-bio">Im a 16 year old backend developer, Skilled in python java php, I own services with affordable cost</div>
    
    <div class="social-icons">
        <a href="https://discord.gg/ethone" class="social-btn" target="_blank">
            <img src="discord.png" alt="Discord">
            Discord
        </a>
        <a href="https://t.me/lenziii" class="social-btn" target="_blank">
            <img src="telegram.png" alt="Telegram">
            Telegram
        </a>
    </div>

    <a href="https://ethone.net/" target="_blank" id="gif-link">
        <img src="ethone.gif" alt="ethone" id="gif-preview">
    </a>
</div>

</div>

<audio id="bgm" src="maxa.mp3" loop></audio>

<script>
// ── CAPTCHA ──
function verifyCaptcha() {
    const btn = document.getElementById("captcha-btn");
    const text = document.getElementById("captcha-text");
    btn.classList.add("verified");
    text.textContent = "Verified";
    setTimeout(() => {
        document.getElementById("captcha-screen").style.display = "none";
        const main = document.getElementById("main-content");
        main.style.opacity = "1";
        main.style.pointerEvents = "auto";
        document.getElementById("bgm").play().catch(() => {});
    }, 600);
}

// ── TRANSLATIONS ──
const translations = {
    en: {
        messages: [
            { text: "Hi, My name is ", highlight: "Lenzy" },
            { text: "I love ", highlight: "Money" }
        ],
        about: "About Me",
        bio: "Im a 16 year old backend developer, Skilled in python java php, I own services with affordable cost",
        flag: "🇬🇧",
        code: "EN"
    },
    de: {
        messages: [
            { text: "Hi, mein Name ist ", highlight: "Lenzy" },
            { text: "Ich liebe ", highlight: "Geld" }
        ],
        about: "Über mich",
        bio: "Ich bin ein 16-jähriger Backend-Entwickler. Erfahren in Python, Java und PHP. Biete günstige Dienste an.",
        flag: "🇩🇪",
        code: "DE"
    },
    ru: {
        messages: [
            { text: "Привет, меня зовут ", highlight: "Ленzy" },
            { text: "Я люблю ", highlight: "Деньги" }
        ],
        about: "Обо мне",
        bio: "Мне 16 лет, я бэкенд-разработчик. Знаю Python, Java и PHP. Предлагаю доступные услуги.",
        flag: "🇷🇺",
        code: "RU"
    }
};

// ── TYPEWRITER ──
const element = document.getElementById("typewriter");
let currentMessages = translations.en.messages;
let msgIndex = 0, charIndex = 0, typing = true;
let typewriterTimeout;

function updateDisplay(current, count) {
    let normal = "", highlight = "";
    if (count <= current.text.length) {
        normal = current.text.substring(0, count);
    } else {
        normal = current.text;
        highlight = current.highlight.substring(0, count - current.text.length);
    }
    element.innerHTML = normal + (highlight ? `<span class="highlight">${highlight}</span>` : "");
}

function typeDeleteLoop() {
    const current = currentMessages[msgIndex % currentMessages.length];
    const full = current.text + current.highlight;
    if (typing) {
        charIndex++;
        updateDisplay(current, charIndex);
        if (charIndex >= full.length) {
            typing = false;
            typewriterTimeout = setTimeout(typeDeleteLoop, 2000);
        } else {
            typewriterTimeout = setTimeout(typeDeleteLoop, 120);
        }
    } else {
        charIndex--;
        updateDisplay(current, charIndex);
        if (charIndex <= 0) {
            typing = true;
            charIndex = 0;
            msgIndex = (msgIndex + 1) % currentMessages.length;
            typewriterTimeout = setTimeout(typeDeleteLoop, 200);
        } else {
            typewriterTimeout = setTimeout(typeDeleteLoop, 80);
        }
    }
}

typeDeleteLoop();

// ── VOLUME ──
let volumeOn = true;
const audio = document.getElementById("bgm");
const volumeSlider = document.getElementById("volume-slider");
audio.volume = volumeSlider.value / 100;

volumeSlider.addEventListener("input", function() {
    audio.volume = this.value / 100;
    document.getElementById("volume-icon").src = this.value == 0 ? "muted.png" : "volume.png";
    volumeOn = this.value != 0;
});

document.getElementById("volume-box").addEventListener("click", (e) => {
    if (e.target.id === "volume-slider") return;
    volumeOn = !volumeOn;
    audio.muted = !volumeOn;
    document.getElementById("volume-icon").src = volumeOn ? "volume.png" : "muted.png";
    if (volumeOn) volumeSlider.value = audio.volume * 100;
});

// ── COPY ──
function copyAddress(addr) {
    navigator.clipboard.writeText(addr);
    const popup = document.getElementById("copy-popup");
    popup.classList.add("show");
    setTimeout(() => popup.classList.remove("show"), 1500);
}

// ── LANGUAGE ──
function toggleLang() {
    document.getElementById("lang-container").classList.toggle("open");
}

document.addEventListener("click", function(e) {
    const c = document.getElementById("lang-container");
    if (!c.contains(e.target)) c.classList.remove("open");
});

function setLang(lang) {
    const t = translations[lang];
    document.getElementById("lang-flag").textContent = t.flag;
    document.getElementById("lang-code").textContent = t.code;
    document.querySelectorAll(".lang-option").forEach(o => o.classList.remove("active"));
    document.querySelector(`.lang-option[onclick="setLang('${lang}')"]`).classList.add("active");
    document.getElementById("subtext-about").textContent = t.about;
    document.getElementById("subtext-bio").textContent = t.bio;
    currentMessages = t.messages;
    msgIndex = 0; charIndex = 0; typing = true;
    clearTimeout(typewriterTimeout);
    element.innerHTML = "";
    typeDeleteLoop();
    document.getElementById("lang-container").classList.remove("open");
}
</script>

<script>
document.addEventListener("contextmenu", e => {
    e.preventDefault();
    location.href = "https://ethone.net";
});

document.addEventListener("keydown", e => {
    if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && e.key === "I") ||
        (e.ctrlKey && e.shiftKey && e.key === "C") ||
        (e.ctrlKey && e.shiftKey && e.key === "J") ||
        (e.ctrlKey && e.key === "U") ||
        (e.ctrlKey && e.key === "S")
    ) {
        e.preventDefault();
        location.href = "https://ethone.net";
    }
});

setInterval(() => {
    if (
        window.outerWidth - window.innerWidth > 200 ||
        window.outerHeight - window.innerHeight > 200
    ) {
        location.href = "https://ethone.net";
    }
}, 500);

(function() {
    let el = new Image();
    Object.defineProperty(el, "id", {
        get: () => location.href = "https://ethone.net"
    });
    console.log(el);
})();
</script>

</body>
</html>
